name: Release widget
on:
  workflow_run:
    workflows: ["Build widget"] 
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      pull-requests: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: widget

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile    

      - name: Validate widget manifest
        id: manifest
        env:
          WIDGET_PATH: ${{ github.workspace }}/widget
        run: bun run scripts/validateManifest.ts

      - name: Update widgets
        env:
          WIDGET_PATH: ${{ github.workspace }}/widget
          WIDGET_VERSION: ${{ steps.manifest.outputs.widget_version }}
          WIDGET_ID: ${{ steps.manifest.outputs.widget_id }}
        run: bun run scripts/updateWidgets.ts

      - name: Commit updated widgets.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add widgets.json
          git commit -m "chore: update widgets.json for ${{ steps.manifest.outputs.widget_id }}"
          git push  

      # - name: Zip release artifact
      #   env:
      #     WIDGET_VERSION: ${{ needs.detect.outputs.widget_version }}
      #     WIDGET_ID: ${{ needs.detect.outputs.widget_id }}
      #   run: zip -r build.zip ${{ github.workspace }}/widget

