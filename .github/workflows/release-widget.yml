name: Release widget
on:
  workflow_run:
    workflows: ["Build widget"] 
    types:
      - completed

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      widget_version: ${{ steps.manifest.outputs.widget_version }}
      widget_id: ${{ steps.manifest.outputs.widget_id }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: widget

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile    

      - name: Validate widget manifest
        id: manifest
        env:
          WIDGET_PATH: ${{ github.workspace }}/widget
        run: bun run scripts/validateManifest.ts

  upload:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip for Release
        run: zip -r  ${{ needs.validate.outputs.widget_id }}-v${{ needs.validate.outputs.widget_version }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ needs.validate.outputs.widget_id }}-v${{ needs.validate.outputs.widget_version }}
          name: ${{ needs.validate.outputs.widget_id }}-v${{ needs.validate.outputs.widget_version }}
          files: ${{ needs.validate.outputs.widget_id }}-v${{ needs.validate.outputs.widget_version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        


          
